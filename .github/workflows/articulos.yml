name: Articulos

on:
  # Botón "Run workflow" para correrlo a mano.
  workflow_dispatch:
  # Se dispara solo cuando termina de correr la Action de Transcripciones.
  workflow_run:
    workflows: ["Transcripciones"]
    types:
      - completed

jobs:
  articulos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Escribir artículos nuevos
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Cuántos artículos escribe por corrida.
          MAX_ARTICULOS: "40"
        run: node scripts/generar-articulos.mjs
      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add content/articulos
          if git diff --staged --quiet; then
            echo "Sin artículos nuevos."
            exit 0
          fi
          git commit -m "Nuevos artículos (borradores)"
          # Mientras esto corría, alguien pudo haber subido algo al repo.
          # Traemos lo nuevo, acomodamos nuestro commit encima y recién
          # ahí subimos. Hasta 3 intentos.
          for intento in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "Guardado en el intento $intento."
              exit 0
            fi
            echo "El repo cambió mientras tanto. Reintento $intento..."
            sleep 8
          done
          echo "No se pudo guardar después de 3 intentos."
          exit 1
      - name: Avisar que hay borradores nuevos
        # Si el aviso falla, la Action no se cae: los artículos ya están guardados.
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PANEL_URL: "https://www.mateyeventos.com/admin"
        run: node scripts/avisar-borradores.mjs
