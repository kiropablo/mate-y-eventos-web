name: Transcripciones

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  transcripts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Bajar transcripciones nuevas
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: node scripts/fetch-transcripts.mjs
      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add content/transcripts
          if git diff --staged --quiet; then
            echo "Sin transcripciones nuevas."
          else
            git commit -m "Actualizar transcripciones (automático)"
            git push
          fi
